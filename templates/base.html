<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}마이 헬스 로그{% endblock %}</title>
    <style>
        body {
            font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 16px;
            color: #222;
            background: #fafafa;
        }
        h1 { font-size: 22px; }
        .card {
            background: #fff;
            border: 1px solid #e2e2e2;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        label { display: block; margin-top: 10px; font-size: 13px; color: #555; }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 16px;
            padding: 10px 16px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button.danger { background: #dc2626; padding: 4px 10px; font-size: 12px; margin-top: 0; }
        .error { color: #dc2626; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .badge.warn { background: #fee2e2; color: #991b1b; }
        .badge.ok { background: #dcfce7; color: #166534; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .top-bar a { font-size: 13px; color: #666; text-decoration: none; }
        form.inline { display: inline; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
